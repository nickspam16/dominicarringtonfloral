<style>
  :root{
    --ivory:#faf7f2;
    --ink:#2b2b26;
    --sage:#8a9179;
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:'Jost',-apple-system,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:var(--ivory);color:var(--ink);font-family:var(--sans);font-weight:300}
  a{color:inherit;text-decoration:none}

  header{text-align:center;padding:84px 24px 60px}
  header h1{font-family:var(--serif);font-weight:500;font-size:clamp(1.7rem,4vw,2.4rem);letter-spacing:.12em}
  header p{margin-top:10px;font-size:.7rem;letter-spacing:.42em;text-transform:uppercase;color:var(--sage)}

  main{max-width:1200px;margin:0 auto;padding:0 24px 40px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:22px}
  .tile{aspect-ratio:4/5;overflow:hidden;display:flex;align-items:center;justify-content:center}
  /* PLACEHOLDERS — replace each .tile's contents with:
     <img src="photo.jpg" alt="" style="width:100%;height:100%;object-fit:cover;display:block">
     Photos to be selected from the studio's collection. */
  .tile svg{width:44%;opacity:.75;stroke:#6b6350;fill:none;stroke-width:1.1}
  /* Real photos: just drop <img src="x.jpg" alt=""> inside any .tile — styling is automatic */
  .tile img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s ease,opacity .6s ease}
  .tile:has(img){cursor:zoom-in}
  .tile:has(img):hover img{transform:scale(1.025)}

  /* Gentle reveal on scroll */
  .tile{opacity:0;transform:translateY(14px);transition:opacity .7s ease,transform .7s ease}
  .tile.seen{opacity:1;transform:none}
  @media(prefers-reduced-motion:reduce){
    .tile{opacity:1;transform:none;transition:none}
    .tile img{transition:none}
  }

  /* Lightbox — activates only for real photos */
  #lb{position:fixed;inset:0;background:rgba(43,43,38,.96);display:none;align-items:center;justify-content:center;z-index:50;cursor:zoom-out}
  #lb.open{display:flex}
  #lb img{max-width:92vw;max-height:92vh;object-fit:contain}
  .t1{background:linear-gradient(160deg,#ece4d4,#dcd2bd)}
  .t2{background:linear-gradient(160deg,#e7dfd6,#cfc4ae)}
  .t3{background:linear-gradient(160deg,#eee2d8,#dbc3b1)}

  .t7{background:linear-gradient(160deg,#e6ddcf,#d8c6ad)}
  .t8{background:linear-gradient(160deg,#ede5d9,#d2c9b4)}
  .t9{background:linear-gradient(160deg,#e8e0d2,#cec0a8)}

  footer{text-align:center;padding:70px 24px 60px}

  .contact a{border-bottom:1px solid #ddd5c7;padding-bottom:2px;width:fit-content;margin:0 auto;transition:border-color .25s}

<script>
(function(){
  // Reveal tiles as they enter the viewport (no-op gracefully if unsupported)
  var tiles=[].slice.call(document.querySelectorAll('.tile'));
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(es){
      es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('seen'); io.unobserve(e.target); } });
    },{threshold:.15});
    tiles.forEach(function(t){ io.observe(t); });
  } else {
    tiles.forEach(function(t){ t.classList.add('seen'); });
  }

  // Lightbox for real photos only (placeholder art is ignored)
  var lb=document.getElementById('lb'), lbImg=lb.querySelector('img');
  document.querySelector('.grid').addEventListener('click',function(ev){
    var tile=ev.target.closest('.tile'); if(!tile) return;
    var img=tile.querySelector('img'); if(!img) return;
    lbImg.src=img.src; lb.classList.add('open'); document.body.style.overflow='hidden';
  });
  function closeLb(){ lb.classList.remove('open'); lbImg.src=''; document.body.style.overflow=''; }
  lb.addEventListener('click',closeLb);
  document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeLb(); });

  // Lazy-load any real photos automatically
  document.querySelectorAll('.tile img').forEach(function(i){ i.loading='lazy'; });

})();
</script>
